name: Deploy API to Cloud Run

on:
  push:
    branches:
      - master
    paths:
      - 'api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate puzzle schedule
        run: node scripts/generate-puzzle-schedule.mjs > api/KClip.Api/Data/puzzle-schedule.json

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy kclip-api \
            --source ./api/KClip.Api \
            --region australia-southeast1 \
            --project k-clip-32037 \
            --clear-base-image \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=k-clip-32037,FIRESTORE_DATABASE_ID=k-clip,ASPNETCORE_URLS=http://+:8080"
